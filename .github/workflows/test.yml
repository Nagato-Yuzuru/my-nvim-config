name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  minitest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1.6.1
        with:
          neovim: true
          version: stable

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .deps
          key: test-deps-${{ runner.os }}-${{ hashFiles('lazy-lock.json', 'tests/minimal_init.lua') }}

      - name: Run mini.test suite
        run: nvim --headless --noplugin -u tests/minimal_init.lua -c "lua MiniTest.run()"

  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: JohnnyMorganz/stylua-action@76fd70c03e6340ceaf673366712db9b20560b402 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: v2.4.1
          args: --check .

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install selene 0.31.0
        run: |
          curl -sSL -o selene.zip https://github.com/Kampfkarren/selene/releases/download/0.31.0/selene-0.31.0-linux.zip
          echo "dac452422747999ec4919bbb8bb52992b66aae533b60022bf005669de8616671  selene.zip" | sha256sum --check
          mkdir -p "$RUNNER_TEMP/selene-bin"
          unzip -q selene.zip -d "$RUNNER_TEMP/selene-bin"
          chmod +x "$RUNNER_TEMP/selene-bin/selene"

      - name: Run selene
        run: '"$RUNNER_TEMP/selene-bin/selene" .'
